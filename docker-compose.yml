services:
  frontend:
    build:
      context: ./frontend
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - '${BACKEND_PORT:-8080}:8080'
    volumes:
      - ./backend:/app
      - ./db/migrations:/db/migrations
    environment:
      - BACKEND_PORT=8080
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-}
      - SEED_ON_STARTUP=${SEED_ON_STARTUP:-true}
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-kaleido}
      - DB_PASSWORD=${DB_PASSWORD:-kaleido}
      - DB_NAME=${DB_NAME:-kaleido_scan}
      - USE_STUB=${USE_STUB:-false}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      - POSTGRES_USER=${DB_USER:-kaleido}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-kaleido}
      - POSTGRES_DB=${DB_NAME:-kaleido_scan}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-kaleido} -d ${DB_NAME:-kaleido_scan}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
