services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
    environment:
      - BACKEND_PORT=8080
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SEED_ON_STARTUP=${SEED_ON_STARTUP:-true}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-kaleid}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-kaleid}
      - POSTGRES_DB=${DB_NAME:-kaleid_scan}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-kaleid} -d ${DB_NAME:-kaleid_scan}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
