name: Add Copilot Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  add-reviewer:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add Copilot as reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.html_url }}" \
            --add-reviewer Copilot
