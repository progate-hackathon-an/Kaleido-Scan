# .github/workflows/deploy.yml
name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  # ─── バックエンドビルド ──────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Go binary
        working-directory: backend
        run: |
          GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o bootstrap .
          zip -j handler.zip bootstrap

      - name: Add migrations to handler.zip
        run: zip -u backend/handler.zip db/migrations/ -r

      - uses: actions/upload-artifact@v4
        with:
          name: backend-zip
          path: backend/handler.zip

  # ─── フロントエンドテスト ────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run test
        working-directory: frontend

  # ─── バックエンドテスト ──────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go test ./...
        working-directory: backend
      # TODO: golangci-lint は go1.26.1 未対応のためスキップ中
      # go.mod のバージョンを下げるか golangci-lint が対応したら再有効化する
      # - name: golangci-lint
      #   uses: golangci/golangci-lint-action@v6
      #   with:
      #     working-directory: backend

  # ─── インフラ + Lambda デプロイ ──────────────────────────────
  deploy-infra:
    needs: [build-backend, test-frontend, test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          name: backend-zip
          path: backend/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: us-east-1

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Bootstrap（初回のみ有効）
        working-directory: infra
        run: npx cdk bootstrap --ci || true

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never --ci
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
